<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProjectRS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    /* RS-style fixed frame layout */
    #game-frame {
      display: none; /* shown when game starts */
      width: 100%; height: 100%;
      grid-template-columns: 1fr 242px;
      grid-template-rows: 1fr 168px;
      background: #3b3024;
    }

    #game-canvas {
      grid-column: 1; grid-row: 1;
      width: 100%; height: 100%;
      outline: none; touch-action: none;
      border-right: 3px solid #2a2018;
      border-bottom: 3px solid #2a2018;
    }

    /* Right column spans both rows */
    #ui-right-column {
      grid-column: 2; grid-row: 1 / 3;
      display: flex; flex-direction: column;
      background: linear-gradient(180deg, #3b3024 0%, #2d2519 100%);
      overflow: hidden;
      border-left: 1px solid #4a3c2e;
    }

    /* Chat spans bottom-left */
    #ui-chat-area {
      grid-column: 1; grid-row: 2;
      background: #0d0b08;
      border-top: 3px solid #2a2018;
      border-right: 3px solid #2a2018;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="game-frame">
    <canvas id="game-canvas"></canvas>
    <div id="ui-right-column"></div>
    <div id="ui-chat-area"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
