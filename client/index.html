<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProjectRS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    /* RS-style fixed frame layout */
    #game-frame {
      display: none; /* shown when game starts */
      width: 100%; height: 100%;
      grid-template-columns: 1fr 280px;
      grid-template-rows: 1fr 152px;
      background: url('/ui/stone-bg.png') repeat;
    }

    #game-canvas {
      grid-column: 1; grid-row: 1;
      width: 100%; height: 100%;
      outline: none; touch-action: none;
      border-right: 4px solid #1a1208;
      border-bottom: 4px solid #1a1208;
      box-shadow: inset 0 0 0 1px rgba(255,200,100,0.15);
    }

    /* Right column spans both rows — transparent, inherits frame bg */
    #ui-right-column {
      grid-column: 2; grid-row: 1 / 3;
      display: flex; flex-direction: column;
      overflow: hidden;
      border-left: 1px solid rgba(255,200,100,0.12);
    }

    /* Chat spans bottom-left — transparent, inherits frame bg */
    #ui-chat-area {
      grid-column: 1; grid-row: 2;
      border-top: 4px solid #1a1208;
      overflow: hidden;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div id="game-frame">
    <canvas id="game-canvas"></canvas>
    <div id="ui-right-column"></div>
    <div id="ui-chat-area"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
